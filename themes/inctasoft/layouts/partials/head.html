<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --accent: #3b82f6;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: #e5e5e5;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
  }

  .page {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Stars (generated by JS) ── */
  .star-field {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
  }
  .star--twinkle { animation: twinkle var(--dur, 3s) ease-in-out infinite alternate; }
  @keyframes twinkle {
    0% { opacity: 0.15; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1.2); }
  }

  /* ── Content layer ── */
  .content {
    position: relative;
    z-index: 5;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 24px;
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .logo {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    text-decoration: none;
    color: #e5e5e5;
  }
  .logo span { color: var(--accent); }
  nav a {
    color: rgba(255,255,255,0.45);
    text-decoration: none;
    font-size: 0.85rem;
    margin-left: 28px;
    transition: color 0.2s;
  }
  nav a:hover { color: #e5e5e5; }
  nav a.active { color: var(--accent); }

  /* ── Footer ── */
  .site-footer {
    text-align: center;
    padding: 32px 0 24px;
    color: rgba(255,255,255,0.3);
    font-size: 0.75rem;
    flex-shrink: 0;
    margin-top: auto;
  }
  .site-footer a {
    color: rgba(255,255,255,0.35);
    text-decoration: none;
    transition: color 0.2s;
  }
  .site-footer a:hover { color: rgba(255,255,255,0.7); }
  .site-footer p + p { margin-top: 4px; }

  /* ── Blog list ── */
  .blog-header {
    padding: 48px 0 24px;
    text-align: center;
  }
  .blog-header h1 {
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
  }
  .blog-header p {
    color: rgba(255,255,255,0.5);
    font-size: 0.9rem;
  }

  .post-list {
    padding: 16px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .post-card {
    background: rgba(10, 10, 10, 0.5);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 24px;
    transition: background 0.35s, border-color 0.35s, box-shadow 0.35s, transform 0.2s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .post-card:hover {
    background: rgba(12, 12, 18, 0.9);
    border-color: rgba(59, 130, 246, 0.25);
    box-shadow:
      0 0 25px rgba(59, 130, 246, 0.08),
      0 8px 32px rgba(0, 0, 0, 0.4);
    transform: translateY(-2px);
  }
  .post-card h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: rgba(255,255,255,0.85);
    transition: color 0.35s;
  }
  .post-card:hover h2 { color: #fff; }
  .post-card .post-meta {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.3);
    margin-bottom: 10px;
  }
  .post-card .post-summary {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.45);
    line-height: 1.6;
    transition: color 0.35s;
  }
  .post-card:hover .post-summary { color: rgba(255,255,255,0.65); }

  /* ── Single post ── */
  .article-wrapper {
    padding: 40px 0 24px;
  }
  .article-card {
    background: rgba(10, 10, 10, 0.5);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 32px;
  }
  .article-card h1 {
    font-size: clamp(1.4rem, 3.5vw, 2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .article-meta {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.35);
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  /* Article typography */
  .article-content h2 {
    font-size: 1.3rem;
    font-weight: 600;
    margin: 32px 0 12px;
    color: rgba(255,255,255,0.9);
  }
  .article-content h3 {
    font-size: 1.1rem;
    font-weight: 600;
    margin: 24px 0 8px;
    color: rgba(255,255,255,0.85);
  }
  .article-content p {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.65);
    line-height: 1.8;
    margin-bottom: 16px;
  }
  .article-content a {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .article-content a:hover { opacity: 0.8; }
  .article-content ul, .article-content ol {
    margin: 12px 0 16px 20px;
    color: rgba(255,255,255,0.6);
    font-size: 0.95rem;
    line-height: 1.8;
  }
  .article-content li { margin-bottom: 4px; }
  .article-content blockquote {
    border-left: 3px solid var(--accent);
    padding: 8px 16px;
    margin: 16px 0;
    color: rgba(255,255,255,0.55);
    font-style: italic;
    background: rgba(59, 130, 246, 0.03);
    border-radius: 0 8px 8px 0;
  }
  .article-content pre {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    margin: 16px 0;
    font-size: 0.85rem;
    line-height: 1.6;
  }
  .article-content code {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.85em;
  }
  .article-content p code, .article-content li code {
    background: rgba(255,255,255,0.06);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.85em;
  }
  .article-content img {
    max-width: 100%;
    border-radius: 8px;
    margin: 16px 0;
  }
  .article-content hr {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.08);
    margin: 32px 0;
  }

  .back-link {
    display: inline-block;
    color: var(--accent);
    text-decoration: none;
    font-size: 0.85rem;
    margin-top: 24px;
    transition: opacity 0.2s;
  }
  .back-link:hover { opacity: 0.7; }

  /* ── Pagination ── */
  .pagination {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 24px 0;
  }
  .pagination a {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.85rem;
    padding: 8px 16px;
    border: 1px solid rgba(59, 130, 246, 0.2);
    border-radius: 8px;
    transition: background 0.2s, border-color 0.2s;
  }
  .pagination a:hover {
    background: rgba(59, 130, 246, 0.1);
    border-color: rgba(59, 130, 246, 0.4);
  }

  /* ── Responsive ── */
  @media (max-width: 560px) {
    .content { padding: 0 16px; }
    nav a { margin-left: 16px; font-size: 0.8rem; }
    .article-card { padding: 20px 16px; }
    .post-card { padding: 18px 16px; }
  }
</style>
