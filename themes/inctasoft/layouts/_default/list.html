{{ define "main" }}
<div class="blog-header">
  <h1>{{ .Site.Title }}</h1>
  <p>{{ .Site.Params.description }}</p>
</div>

<div class="post-list">
  {{ range .Paginator.Pages }}
  <a href="{{ .Permalink }}" class="post-card">
    <h2>{{ .Title }}</h2>
    <div class="post-meta">{{ .Date.Format "January 2, 2006" }}{{ with .Params.author }} · {{ . }}{{ end }}</div>
    {{ with .Summary }}
    <div class="post-summary">{{ . }}</div>
    {{ end }}
  </a>
  {{ end }}
</div>

{{ template "_internal/pagination.html" . }}
{{ end }}
